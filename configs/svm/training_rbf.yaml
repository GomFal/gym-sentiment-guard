# SVM RBF Model Configuration
# Best model from ablation suite run.2026-01-24_008
# Configuration for reproducible training

model:
  name: sentiment_svm_rbf
  type: svm_rbf
  version: v1

data:
  splits:
    train: data/frozen/sentiment_logreg/2025.12.15_01/train/train.csv
    val: data/frozen/sentiment_logreg/2025.12.15_01/val/val.csv
    test: data/frozen/sentiment_logreg/2025.12.15_01/test/test.csv

  text_column: comment
  label_column: sentiment

  label_mapping:
    negative: 0
    positive: 1


vectorizer:
  type: feature_union
  lowercase: true
  max_df: 0.90
  sublinear_tf: true
  strategies:
    unigrams:
      ngram_range: [1, 1]
      min_df: 10
      stop_words: curated_safe  # Heavy filtering for 1-grams
    multigrams:
      ngram_range: [2, 3]
      min_df: 2
      stop_words: null  # No filtering for 2-3 grams


classifier:
  type: svm_rbf
  kernel: rbf
  C: 3.0          # From best ablation run.2026-02-02_012
  gamma: 0.1      # From best ablation run.2026-02-02_012
  tol: 0.001
  cache_size: 1000
  max_iter: -1
  random_state: 42
  use_scaler: false  # From best ablation run.2026-02-02_012


calibration:
  enabled: true
  method: isotonic
  cv: 5
  random_state: 42


decision:
  threshold: 0.38315719729595116  # From ablation winner run.2026-01-24_008
  target_class: negative


runtime:
  python_version: "3.12.4"
  sklearn_version: "1.7.2"


artifacts:
  output_dir: artifacts/models/svm_rbf
  format: joblib


# Provenance (from ablation)
experiment:
  source_run: run.2026-02-02_012
  suite: suite.2026-02-02
  val_metrics:
    f1_neg: 0.9009
    recall_neg: 0.9207
    precision_neg: 0.882
    macro_f1: 0.9351
    pr_auc_neg: 0.9444

